<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background layer matching dark theme zinc-900 or transparent -->
  <rect width="200" height="200" rx="40" fill="transparent" />

  <g transform="translate(30, 20) scale(1.1)">
    <!-- Burger Icon in Cart / Zap -->
    <!-- Top Bun -->
    <path d="M25,60 C25,10 125,10 125,60 Z" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="50" cy="35" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="75" cy="25" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="100" cy="35" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="40" cy="50" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="110" cy="45" r="3" fill="#fff" opacity="0.6"/>
    
    <!-- Lettuce -->
    <path d="M20,60 Q35,75 50,60 T80,60 T110,60 T130,60 L130,65 Q115,80 100,65 T70,65 T40,65 T20,65 Z" fill="#22c55e"/>
    
    <!-- Cheese -->
    <path d="M20,68 L130,68 L120,80 L90,68 L70,80 L50,68 L30,80 Z" fill="#fbbf24"/>
    
    <!-- Patty -->
    <rect x="22" y="72" width="106" height="20" rx="10" fill="#3f1d0b"/>
    
    <!-- Bottom Bun -->
    <path d="M25,95 Q25,115 75,115 T125,95 Z" fill="#f59e0b"/>
    
    <!-- Shopping Cart Wheels/Base -->
    <path d="M5,105 L20,105 L35,135 L115,135 L130,105" fill="none" stroke="#f4f4f5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="148" r="9" fill="#f4f4f5"/>
    <circle cx="105" cy="148" r="9" fill="#f4f4f5"/>
    
    <!-- Lightning Bolt / Zap -->
    <path d="M85,-5 L60,40 L90,40 L65,85 L105,30 L75,30 Z" fill="#ef4444" filter="url(#glow)"/>
  </g>
</svg>
